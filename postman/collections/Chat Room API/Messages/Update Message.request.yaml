$kind: http-request
name: Update Message
method: PATCH
url: '{{base_url}}/messages/api/v1/{{message_id}}/message-update/'
order: 4000
auth:
  type: bearer
  credentials:
    token: "{{access_token}}"
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "text": "Edit Test message"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has required fields", function () {
          const json = pm.response.json();
          pm.expect(json).to.have.property("text");
      });
    language: text/javascript
