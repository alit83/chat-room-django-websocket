$kind: http-request
method: DELETE
url: '{{base_url}}/messages/api/v1/room/{{room_id}}/message-delete/{{message_id}}/'
order: 5000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 204", function () {
          pm.response.to.have.status(204);
      });
