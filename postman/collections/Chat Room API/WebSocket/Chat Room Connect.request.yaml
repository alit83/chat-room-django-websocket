$schema: https://schema.postman.com/json/collection/v2.1.0/collection.json
$kind: websocket-request
name: Chat Room Connect
description: Connect to Django Channels WebSocket room
url: ws://localhost:8000/ws/room/{{room_id}}/?token={{access_token}}

# Optional: Headers (useful for authentication)
headers:
  - key: Origin
    value: http://localhost:3000
    enabled: true

# Initial messages to send after connection (Postman supports this)
messages:
  - type: text
    content: |
      { 
        "type": "join_room",
        "messages": "salam dadash"
      }
    enabled: true
  - type: text
    content: "Hello from Postman!"
    enabled: false

