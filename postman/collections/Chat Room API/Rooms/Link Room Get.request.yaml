$kind: http-request
method: GET
url: '{{base_url}}/rooms/api/v1/room/{{room_link}}/link/'
order: 3000
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Each room has required fields", function () {
          const json = pm.response.json();
          if (json.length > 0) {
              const room = json[0];
              pm.expect(room).to.have.property("id");
              pm.expect(room).to.have.property("name");
              pm.expect(room).to.have.property("model");
          }
      });
